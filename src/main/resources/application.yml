spring:
  application:
    name: msa_discoveryservice

server:
  port: 8761  # 스프링 어플리케이션 이름이 msa_discoveryservice 인 것의 포트번호 지정

eureka:
  client:
    register-with-eureka: false  # Service Discovery 서버용도로만 사용하는 것이지, Service Discovery 서버상에 자신을 서비스 클라이언트로 등록하지 말라고 설정해주는 것이다. 
    fetch-registry: false        # Service Discovery 서버용도로만 사용하는 것이지, Service Discovery 서버상에 자신을 서비스 클라이언트로 등록하지 말라고 설정해주는 것이다. 

logging:
  level:
    com.netflix.eureka: WARN # Eureka 서버는 일정 주기마다(기본적으로 60초마다 실행) 등록된 서비스 인스턴스를 검사한다.(등록된 서비스 중 죽은 서비스가 있는지 검사 중) 그래서 로그가 계속 찍히므로 우리는 이러한 로그는 찍히지 않도록 설정한다.   
    com.netflix.discovery: WARN


